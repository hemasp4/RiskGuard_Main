<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cybercrime Investigation Unit — Secure Access</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-badge">
                <div class="badge-icon">🔒</div>
                <div class="badge-glow"></div>
            </div>
            <h1 class="login-title">Cybercrime Investigation Unit</h1>
            <p class="login-subtitle">Nimirdhu Nill Evidence Ledger — Secure Access</p>

            {% if error %}
            <div class="alert alert-error">
                <p>{{ error }}</p>
            </div>
            {% endif %}

            <form method="POST" action="/login" class="login-form">
                <div class="form-group">
                    <label for="username">Officer ID</label>
                    <input type="text" id="username" name="username" autocomplete="username" placeholder="Enter your ID"
                        required>
                </div>
                <div class="form-group">
                    <label for="password">Access Code</label>
                    <input type="password" id="password" name="password" autocomplete="current-password"
                        placeholder="Enter your access code" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    <span>🛡️</span> Authenticate
                </button>
            </form>

            <div class="login-footer">
                <p>Unauthorized access is a criminal offense under IT Act, 2000</p>
                <p class="tech-note">Protected by Polygon Blockchain · IPFS · SHA-256</p>
            </div>
        </div>
    </div>
</body>

</html>
